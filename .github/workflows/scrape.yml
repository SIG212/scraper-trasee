name: Scraper Trasee

on:
 
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesar pentru git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependente
        run: pip install requests beautifulsoup4 google-genai

      - name: Ruleaza scraper-ul
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scrape_trasee.py

      - name: Commit si push trasee.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trasee.json
          # Commit doar daca exista modificari
          git diff --cached --quiet || git commit -m "chore: update trasee.json [$(date -u +'%Y-%m-%d')]"
          git push
