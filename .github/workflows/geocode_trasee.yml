name: Geocodare Trasee

on:
  workflow_dispatch:  # doar manual din tab-ul Actions

jobs:
  geocode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependente
        run: pip install requests

      - name: Geocodeaza coordonate
        run: python geocode_trasee.py

      - name: Commit si push trasee.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trasee.json
          git diff --cached --quiet || git commit -m "chore: add lat/lng to trasee.json [$(date -u +'%Y-%m-%d')]"
          git push
