<script>
const JSON_URL = 'trasee.json';
const OSRM = 'https://router.project-osrm.org/route/v1/driving';
const BATCH = 10;

let TRASEE = [];
let userLat = 46.77, userLng = 23.59;
let osrmCache = {};
let currentCancelToken = { cancelled: false };

const ORASE_PRESET = {
  'cluj-napoca':[46.77,23.59],'cluj':[46.77,23.59],
  'bucurești':[44.43,26.10],'bucuresti':[44.43,26.10],'bucharest':[44.43,26.10],
  'brașov':[45.65,25.61],'brasov':[45.65,25.61],
  'timișoara':[45.75,21.23],'timisoara':[45.75,21.23],
  'iași':[47.16,27.58],'iasi':[47.16,27.58],
  'craiova':[44.32,23.80],'oradea':[47.05,21.93],
  'sibiu':[45.80,24.15],'constanța':[44.18,28.63],'constanta':[44.18,28.63],
  'târgu mureș':[46.54,24.56],'targu mures':[46.54,24.56],
  'alba iulia':[46.07,23.57],'deva':[45.88,22.91],
  'pitești':[44.85,24.87],'pitesti':[44.85,24.87],
  'ploiești':[44.93,26.02],'ploiesti':[44.93,26.02],
  'galați':[45.43,28.05],'galati':[45.43,28.05],
  'târgoviște':[44.93,25.46],'targoviste':[44.93,25.46],
  'focșani':[45.70,27.18],'focsani':[45.70,27.18],
  'bacău':[46.57,26.91],'bacau':[46.57,26.91],
  'suceava':[47.65,26.25],'baia mare':[47.66,23.58],
  'satu mare':[47.79,22.88],'drobeta':[44.63,22.66],
};

const CULORI = {
  'Bucegi':'#0F6E56','Făgăraș':'#185FA5','Piatra Craiului':'#534AB7',
  'Retezat':'#993C1D','Apuseni':'#854F0B','Cindrel':'#3B6D11',
  'Postăvaru':'#0F6E56','Baiului':'#5F5E5A','Leaota':'#3B6D11',
  'Buila':'#854F0B','Maramureș':'#185FA5','Trascău':'#534AB7',
};

function culoare(munte) {
  if (!munte) return '#1D9E75';
  for (const k in CULORI) if (munte.includes(k)) return CULORI[k];
  return '#1D9E75';
}

function fmtDuration(seconds) {
  if (!seconds) return '—';
  const h = Math.floor(seconds / 3600);
  const m = Math.round((seconds % 3600) / 60);
  if (h === 0) return m + ' min';
  return m > 0 ? `${h}h ${m}min` : `${h}h`;
}

function badge(dif) {
  if (!dif || dif === 'null') return '';
  const cls = {usor:'badge-usor',mediu:'badge-mediu',greu:'badge-greu'}[dif]||'badge-default';
  const label = {usor:'ușor',mediu:'mediu',greu:'greu'}[dif]||dif;
  return `<span class="badge ${cls}">${label}</span>`;
}

function tipBadge(tip) {
  if (!tip || tip === 'null') return '';
  return `<span class="badge badge-default">${tip}</span>`;
}

function renderCard(t, driveSecs) {
  const bg = culoare(t.munte);
  const imgSrc = t.poza_url || '';
  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="${t.nume}" loading="lazy" onerror="this.parentElement.style.background='${bg}';this.remove();">`
    : `<div class="card-img-fallback" style="background:${bg}"></div>`;

  const stats = [
    {val: t.durata_h != null ? t.durata_h+'h' : '—', lbl:'durată'},
    {val: t.km != null ? t.km+' km' : '—', lbl:'distanță'},
    {val: t.denivelare_m != null ? t.denivelare_m+'m' : '—', lbl:'denivelare'},
    {val: t.zile != null ? (t.zile===1?'1 zi':t.zile+' zile') : '—', lbl:'zile'},
  ];

  const blogName = {
    bloguldecalatorii:'Blogul de Călătorii',
    thechillinbear:'TheChillinBear',
    chitaracalatoare:'Chitara Călătoare',
    jurnaldedrumetii:'Jurnal de Drumeții',
    suspemunte:'SusPeMunte',
  }[t.sursa_blog] || t.sursa_blog;

  return `<div class="card">
    <div class="card-img">
      ${imgHtml}
      <div class="card-badges">${badge(t.dificultate)}${tipBadge(t.tip)}</div>
      ${t.munte?`<div class="card-munte">${t.munte}</div>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${t.nume}</div>
      <div class="card-meta">
        ${t.localitate_start?`<span>${t.localitate_start}</span><span class="card-meta-sep">·</span>`:''}
        ${t.sezon&&t.sezon!=='null'?`<span>${t.sezon}</span><span class="card-meta-sep">·</span>`:''}
        <span class="source-chip">${blogName}</span>
      </div>
      <div class="card-stats">
        ${stats.map(s=>`<div class="stat"><span class="stat-val">${s.val}</span><span class="stat-lbl">${s.lbl}</span></div>`).join('')}
      </div>
      <div class="card-footer">
        <div class="card-drive">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="5" width="11" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3 5V4a3.5 3.5 0 017 0v1" stroke="currentColor" stroke-width="1.2"/><circle cx="3.5" cy="9" r="1" fill="currentColor"/><circle cx="9.5" cy="9" r="1" fill="currentColor"/></svg>
          ${fmtDuration(driveSecs)} cu mașina
        </div>
        <a class="card-link" href="${t.sursa_url}" target="_blank" rel="noopener">
          Articol
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 9L9 2M9 2H4M9 2v5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </a>
      </div>
    </div>
  </div>`;
}

async function osrmBatch(origin, destinations, token) {
  const results = {};
  const batches = [];
  for (let i = 0; i < destinations.length; i += BATCH) {
    batches.push(destinations.slice(i, i + BATCH));
  }

  let done = 0;
  const progress = document.getElementById('osrm-progress');

  for (const batch of batches) {
    if (token.cancelled) break;

    const coords = [[origin.lng, origin.lat], ...batch.map(d => [d.lng, d.lat])];
    const coordStr = coords.map(c => c.join(',')).join(';');
    const sources = '0';
    const destinations_idx = batch.map((_, i) => i + 1).join(';');

    try {
      const url = `https://router.project-osrm.org/table/1/driving/${coordStr}?sources=${sources}&destinations=${destinations_idx}&annotations=duration`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.durations && data.durations[0]) {
        batch.forEach((d, i) => {
          results[d.key] = data.durations[0][i];
        });
      }
    } catch {
      batch.forEach(d => { results[d.key] = null; });
    }

    done += batch.length;
    if (progress) progress.textContent = `${done} / ${destinations.length} trasee procesate`;
    await new Promise(r => setTimeout(r, 150));
  }

  return results;
}

async function calculeazaSiAfiseaza() {
  const maxSecs = Number(document.getElementById('sel-timp').value) * 60;
  const dif = document.getElementById('sel-dif').value;
  const zile = document.getElementById('sel-zile').value;

  currentCancelToken.cancelled = true;
  const token = { cancelled: false };
  currentCancelToken = token;

  const seen = new Set();
  const candidati = TRASEE.filter(t => {
    if (!t.lat || !t.lng) return false;
    if (dif && (t.dificultate || '') !== dif) return false;
    if (zile && String(t.zile) !== zile) return false;
    const key = t.sursa_url.replace(/#.*$/, '');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).map(t => ({
    t,
    key: `${t.lat},${t.lng}`,
    lat: t.lat,
    lng: t.lng,
  }));

  const cacheKey = `${userLat.toFixed(4)},${userLng.toFixed(4)}`;
  if (!osrmCache[cacheKey]) osrmCache[cacheKey] = {};
  const cache = osrmCache[cacheKey];

  const needFetch = candidati.filter(d => cache[d.key] === undefined);

  const overlay = document.getElementById('osrm-overlay');
  const output = document.getElementById('output');

  if (needFetch.length > 0) {
    overlay.classList.add('visible');
    document.getElementById('osrm-progress').textContent = `0 / ${needFetch.length} trasee procesate`;

    const fresh = await osrmBatch({ lat: userLat, lng: userLng }, needFetch, token);
    if (token.cancelled) { overlay.classList.remove('visible'); return; }

    Object.assign(cache, fresh);
    overlay.classList.remove('visible');
  }

  const results = candidati
    .map(({ t, key }) => ({ t, secs: cache[key] }))
    .filter(({ secs }) => secs != null && secs <= maxSecs)
    .sort((a, b) => a.secs - b.secs);

  const bar = document.getElementById('result-bar');
  const count = document.getElementById('result-count');

  bar.style.display = results.length > 0 ? 'flex' : 'none';
  count.innerHTML = `<span>${results.length}</span> trasee găsite`;

  if (results.length === 0) {
    output.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M8 40L20 16l8 14 6-8 6 10" stroke="#1a1612" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>Niciun traseu găsit.<br>Încearcă o rază mai mare sau schimbă filtrele.</p>
    </div>`;
    return;
  }

  output.innerHTML = `<div class="cards-grid">${results.map(({t, secs}) => renderCard(t, secs)).join('')}</div>`;
}

function cauta() { calculeazaSiAfiseaza(); }

let geocodeTimer = null;
let acTimer = null;
let acActive = -1;
let acResults = [];

const inp = document.getElementById('inp-oras');
const dropdown = document.getElementById('ac-dropdown');
const status = document.getElementById('oras-status');

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  acActive = -1;
  acResults = [];
}

async function selectResult(item) {
  inp.value = item.name;
  status.textContent = 'Se încarcă...';
  status.className = 'oras-status';
  closeDropdown();

  if (item.lat && item.lng) {
    userLat = item.lat;
    userLng = item.lng;
  } else if (item.mapbox_id) {
    const coords = await retrieveLocation(item.mapbox_id);
    if (!coords) {
      status.textContent = 'Eroare la încărcarea locației';
      status.className = 'oras-status err';
      return;
    }
    userLat = coords.lat;
    userLng = coords.lng;
  }

  status.textContent = '✓ ' + item.name;
  status.className = 'oras-status ok';
  osrmCache = {};
  calculeazaSiAfiseaza();
}

function renderDropdown(items) {
  if (!items.length) { closeDropdown(); return; }
  acResults = items;
  acActive = -1;
  dropdown.innerHTML = items.map((item, i) =>
    `<div class="ac-item" data-i="${i}">
      <div class="ac-item-name">${item.name}</div>
      <div class="ac-item-sub">${item.sub}</div>
    </div>`
  ).join('');
  dropdown.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectResult(acResults[parseInt(el.dataset.i)]);
    });
  });
  dropdown.classList.add('open');
}

const MAPBOX_TOKEN = 'pk.eyJ1Ijoic2VyZ2l1ZzI2IiwiYSI6ImNtbXZ1czBoYjJmcTgycnF4OGVtenprYW0ifQ.EjmcKrTUnaOZbrCW-tnvSg';

function generateSessionToken() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

let sessionToken = generateSessionToken();

async function fetchSugestii(text) {
  inp.classList.add('loading');
  try {
    const url = `https://api.mapbox.com/search/searchbox/v1/suggest?q=${encodeURIComponent(text)}&language=ro&country=RO&types=city,town,village,municipality&session_token=${sessionToken}&access_token=${MAPBOX_TOKEN}`;
    const res = await fetch(url);
    const data = await res.json();

    const items = (data.suggestions || []).slice(0, 5).map(s => ({
      name: s.name,
      sub: s.place_formatted || 'România',
      mapbox_id: s.mapbox_id,
    }));

    renderDropdown(items);
  } catch {
    closeDropdown();
  } finally {
    inp.classList.remove('loading');
  }
}

async function retrieveLocation(mapbox_id) {
  const res = await fetch(
    `https://api.mapbox.com/search/searchbox/v1/retrieve/${mapbox_id}?session_token=${sessionToken}&access_token=${MAPBOX_TOKEN}`
  );
  const data = await res.json();
  const feature = data.features?.[0];
  if (!feature) return null;
  const [lng, lat] = feature.geometry.coordinates;
  sessionToken = generateSessionToken();
  return { lat, lng };
}

inp.addEventListener('input', e => {
  const val = e.target.value.trim();
  clearTimeout(acTimer);
  if (val.length < 2) { closeDropdown(); return; }
  acTimer = setTimeout(() => fetchSugestii(val), 150);
});

inp.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActive = Math.min(acActive + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActive));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActive = Math.max(acActive - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActive));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acActive >= 0 && acResults[acActive]) {
      selectResult(acResults[acActive]);
    } else if (acResults.length > 0) {
      selectResult(acResults[0]);
    } else {
      closeDropdown();
      geocodeOras(inp.value.trim());
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

inp.addEventListener('blur', () => setTimeout(closeDropdown, 150));

async function geocodeOras(text) {
  const key = text.trim().toLowerCase();
  osrmCache = {};

  if (ORASE_PRESET[key]) {
    [userLat, userLng] = ORASE_PRESET[key];
    status.textContent = '';
    status.className = 'oras-status ok';
    calculeazaSiAfiseaza();
    return;
  }

  inp.classList.add('loading');
  status.textContent = 'Se caută...';
  status.className = 'oras-status';

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(text+', Romania')}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'ro' } }
    );
    const data = await res.json();
    if (data.length > 0) {
      userLat = parseFloat(data[0].lat);
      userLng = parseFloat(data[0].lon);
      const name = data[0].display_name.split(',')[0];
      status.textContent = '✓ ' + name;
      status.className = 'oras-status ok';
      calculeazaSiAfiseaza();
    } else {
      status.textContent = 'Orașul nu a fost găsit';
      status.className = 'oras-status err';
    }
  } catch {
    status.textContent = 'Eroare la geocoding';
    status.className = 'oras-status err';
  } finally {
    inp.classList.remove('loading');
  }
}

document.getElementById('sel-timp').addEventListener('change', cauta);
document.getElementById('sel-dif').addEventListener('change', cauta);
document.getElementById('sel-zile').addEventListener('change', cauta);

fetch(JSON_URL)
  .then(r => r.json())
  .then(data => {
    TRASEE = data.trasee || [];
    geocodeOras('Cluj-Napoca');
  })
  .catch(err => {
    document.getElementById('output').innerHTML = `<div class="empty-state"><p>Eroare la încărcarea traseelor: ${err.message}</p></div>`;
  });
</script>
